<!doctype html>
<html lang="hu">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Főoldal</title>
        <!--!Bootstrap-->
        <link rel="stylesheet" href="../bootstrap/css/bootstrap.min.css" />
        <!--?Popper: dropdowns, popovers, tooltips-->
        <script src="../bootstrap/js/popper.min.js"></script>
        <script src="../bootstrap/js/bootstrap.min.js"></script>
        <!--!CSS-->
        <link rel="stylesheet" href="../css/index.css" />
        <!--!JavaScript-->
        <script src="../javascript/ujauto.js"></script>
    </head>
    <body>
        <nav class="navbar bg-dark" data-bs-theme="dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="/feladat2">Főoldal</a>
                <a class="navbar-brand" href="/megtekintes2">Autók megtekintése</a>
                <a class="navbar-brand" href="/hozzaadas2">Új autó</a>
                <a class="navbar-brand" href="/autoSzerkesztes">Autó szerkesztése</a>
            </div>
        </nav>
        <div class="container-fluid">
            <div class="row text-center d-flex flex-column gap-3 w-100 py-5 align-items-center">
                <form
                    name="ujauto"
                    id="ujauto"
                    enctype="multipart/form-data"
                    class="d-flex flex-column gap-3 w-25"
                >
                    <input class="form-control" type="text" name="marka" placeholder="Márka" />
                    <input class="form-control" type="text" name="modell" placeholder="Modell" />
                    <input
                        class="form-control"
                        type="number"
                        name="gyartas"
                        placeholder="Gyártási év"
                    />
                    <input
                        class="form-control"
                        type="text"
                        name="alvazszam"
                        placeholder="Alvázszám"
                    />
                    <input class="form-control" type="number" name="loero" placeholder="Lóerő" />
                    <input
                        class="form-control"
                        type="number"
                        name="kilometer"
                        placeholder="Kilométer óra állás"
                    />
                    <input
                        class="form-control"
                        type="text"
                        name="uzemanyag"
                        placeholder="Üzemanyag típusa"
                    />
                    <input
                        class="form-control"
                        type="number"
                        name="fogyasztas"
                        placeholder="Fogyasztás"
                    />
                    <input
                        class="form-control"
                        type="number"
                        name="uzemanyagSzint"
                        placeholder="Üzemanyag szint"
                    />
                    <input
                        type="button"
                        id="leadas"
                        value="Hozzáadás"
                        class="form-control btn btn-primary"
                    />
                </form>
            </div>
        </div>
    </body>
</html>
